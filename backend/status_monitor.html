<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSync Status Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f8f0;
            color: #2e7d32;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2e7d32;
        }
        .status-box {
            border: 2px solid #2e7d32;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .anomaly {
            background-color: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
        }
        .connected {
            color: #4caf50;
        }
        .disconnected {
            color: #f44336;
        }
        .timestamp {
            font-size: 0.9em;
            color: #757575;
        }
        .insight {
            font-style: italic;
            padding: 10px;
            background-color: #e8f5e9;
            border-left: 4px solid #4caf50;
            margin: 10px 0;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #388e3c;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EcoSync Status Monitor</h1>
        
        <div class="controls">
            <button id="connectBtn">Connect to Backend</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>
        
        <div id="connectionStatus" class="status-box">
            <h3>Connection Status: <span id="statusText" class="disconnected">Disconnected</span></h3>
        </div>
        
        <div id="dataDisplay" class="status-box">
            <h3>Latest Data:</h3>
            <div id="latestData">Waiting for data...</div>
        </div>
        
        <div id="logContainer" class="status-box">
            <h3>Recent Insights:</h3>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // Configuration - update this to match your backend IP and port
        const BACKEND_URL = 'ws://localhost:8000/ws'; // Change this to your backend IP if needed
        
        let socket = null;
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusText = document.getElementById('statusText');
        const latestData = document.getElementById('latestData');
        const log = document.getElementById('log');
        
        // Connect to WebSocket
        function connect() {
            try {
                socket = new WebSocket(BACKEND_URL);
                
                socket.onopen = function(event) {
                    console.log('Connected to backend');
                    statusText.textContent = 'Connected';
                    statusText.className = 'connected';
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                };
                
                socket.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    updateDisplay(data);
                    addToLog(data);
                };
                
                socket.onclose = function(event) {
                    console.log('Disconnected from backend');
                    statusText.textContent = 'Disconnected';
                    statusText.className = 'disconnected';
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    
                    // Attempt to reconnect after 5 seconds
                    setTimeout(connect, 5000);
                };
                
                socket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    statusText.textContent = 'Error';
                    statusText.className = 'disconnected';
                };
            } catch (error) {
                console.error('Failed to create WebSocket connection:', error);
                statusText.textContent = 'Connection Failed';
                statusText.className = 'disconnected';
            }
        }
        
        // Disconnect from WebSocket
        function disconnect() {
            if (socket) {
                socket.close();
            }
        }
        
        // Update the display with latest data
        function updateDisplay(data) {
            let html = `
                <div class="timestamp">Timestamp: ${data.timestamp}</div>
                <div class="metric"><strong>System Status:</strong> ${data.system_status}</div>
                <div class="metric"><strong>Scale Level:</strong> ${(data.scale_level * 100).toFixed(1)}%</div>
                <div class="metric"><strong>Watts:</strong> ${data.metrics.watts} W</div>
                <div class="metric"><strong>Occupancy:</strong> ${data.metrics.occupancy}</div>
                <div class="metric"><strong>Carbon Saved:</strong> ${data.metrics.carbon_saved} kg</div>
                <div class="metric"><strong>Anomaly:</strong> ${data.is_anomaly ? 'Yes' : 'No'}</div>
            `;
            
            if (data.is_anomaly) {
                document.getElementById('dataDisplay').className = 'status-box anomaly';
            } else {
                document.getElementById('dataDisplay').className = 'status-box';
            }
            
            latestData.innerHTML = html;
        }
        
        // Add insight to the log
        function addToLog(data) {
            const logEntry = document.createElement('div');
            logEntry.className = 'insight';
            logEntry.innerHTML = `
                <div><strong>${data.ai_insight}</strong></div>
                <div class="timestamp">${data.timestamp}</div>
            `;
            
            // Add to top of log
            log.insertBefore(logEntry, log.firstChild);
            
            // Limit log to 10 entries
            if (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }
        
        // Event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        
        // On page load, try to connect automatically
        window.onload = function() {
            connect();
        };
    </script>
</body>
</html>
