# EcoSync Application Configuration
spring.application.name=EcoSync-AI-Engine
server.port=8080

# ===========================================
# DATABASE CONFIGURATION (H2 for Development)
# ===========================================
spring.datasource.url=jdbc:h2:mem:ecosync_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# EXTERNAL API CONFIGURATION
# ===========================================
# OpenWeatherMap API Key (get free key at https://openweathermap.org/api)
openweathermap.api.key=demo
openweathermap.city.id=5128581

# Utility Pricing (default values)
utility.price.per.kwh=0.12
utility.currency=USD

# ===========================================
# ACTUATOR & MONITORING
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true

# ===========================================
# API DOCUMENTATION (OpenAPI/Swagger)
# ===========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===========================================
# LOGGING
# ===========================================
logging.level.com.ecosync=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

