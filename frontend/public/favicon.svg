<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  <!-- Atom-like symbol -->
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="white" stroke-width="4" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="white" stroke-width="4" transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="white" stroke-width="4" transform="rotate(120 50 50)"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="8" fill="white"/>
</svg>
